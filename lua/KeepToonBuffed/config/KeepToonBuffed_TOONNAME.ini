; ================================================================
;  KeepToonBuffed_Charname.ini
;  Configuration file for KeepToonBuffed.lua (MacroQuest Lua script)
;
;  Place this file in the MacroQuest config directory:
;    MacroQuest/config/KeepToonBuffed_Charname.ini
;
;  Replace "Charname" with your character's exact in-game name.
;  The script auto-loads the file matching the logged-in character.
;
;  Sections
;  --------
;  [Settings]   General behaviour + the single heal spell used for all targets
;  [Targets]    Characters to monitor for healing AND buffs (name + HP threshold only)
;  [Buffs]      Spells maintained on every target in [Targets]
;  [SelfBuffs]  Spells cast only on your own character
;  [Debuffs]    Spells cast on the tank's mob target by HP threshold
;
;  List syntax
;  -----------
;  Numbered keys (Key1, Key2, ...) define ordered lists.
;  Fields within each entry are pipe-delimited.
;
;    Targets:    Name | HealPct
;    Buffs:      Name | MinTicks | Gem | CastTimeMs
;    SelfBuffs:  Name | MinTicks | Gem | CastTimeMs
;    Debuffs:    Name | TriggerPct | Gem | CastTimeMs
; ================================================================


; ----------------------------------------------------------------
[Settings]
; ----------------------------------------------------------------

; Seconds between each full monitoring pass (integer)
LoopInterval=3

; Minimum mana percentage before any spell is cast (integer, 0-100)
MinManaPct=20

; Suppress buff casting while in combat: true | false
PauseBuffsInCombat=false

; Name of the tank whose current NPC target is watched for debuffing.
; Must also appear in [Targets] so their HP and buffs are maintained.
DebuffTank=Uselesstool

; Follow distance in feet — script stays within this range of DebuffTank
; when follow is toggled on via the GUI button.
FollowDistance=30

; ----- Heal spell (applied to ALL targets in [Targets]) -----
; HealSpell   : spell name exactly as shown in your spellbook
; HealGem     : memorized gem slot (1-12)
; HealCastMs  : approximate cast time in milliseconds
HealSpell=Chlorotrope
HealGem=2
HealCastMs=2500

; SelfHealPct — heal the caster when their own HP% falls at or below this value
SelfHealPct=50


; ----------------------------------------------------------------
[Targets]
; ----------------------------------------------------------------
; One entry per monitored character.
; Format:  KeyN=Name | HealPct
;   Name     — exact character name (case-sensitive)
;   HealPct  — cast the shared heal spell when HP% is at or below this value

Key1=Uselesstool | 70
Key2=Incindiara | 60


; ----------------------------------------------------------------
[Buffs]
; ----------------------------------------------------------------
; Spells maintained on EVERY character listed in [Targets].
; Format:  KeyN=Name | MinTicks | Gem | CastTimeMs
;   Name       — spell name exactly as shown in your spellbook
;   MinTicks   — recast when remaining ticks <= this (0 = only when expired)
;   Gem        — memorized gem slot (1-12)
;   CastTimeMs — approximate cast time in milliseconds

Key1=Blessing of Oak  | 0 | 8 | 3000
Key2=Skin of the Reptile   | 0 | 12 | 3500
Key3=Barkspur             | 2 | 5 | 4000


; ----------------------------------------------------------------
[SelfBuffs]
; ----------------------------------------------------------------
; Spells cast ONLY on your own character (auras, stances, etc.).
; Format:  KeyN=Name | MinTicks | Gem | CastTimeMs

Key1=Blessing of Oak | 0 | 8 | 3000


; ----------------------------------------------------------------
[Debuffs]
; ----------------------------------------------------------------
; Spells cast once per mob on the tank's current NPC target.
; Each debuff fires when the mob's HP% falls at or below TriggerPct,
; then is not recast until a new mob is detected.
; Format:  KeyN=Name | TriggerPct | Gem | CastTimeMs

Key1=Serpent Vines      | 60 | 7 | 2000
;Key2=Malo               | 100 | 8 | 2000
;Key3=Reckless Weakening |  50 | 9 | 2500
